# Alembic configuration.
# Note: the database URL is intentionally NOT set here. It is injected at runtime
# from `settings.DATABASE_URL` (normalized to the psycopg v3 driver) in
# `alembic/env.py`, so secrets stay in `.env` and out of version control.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Use a date-ordered, descriptive slug for new revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
