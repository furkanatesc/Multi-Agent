name: ci

# Runs the quality gates required by the Definition of Done (sprint plan §4):
# mypy --strict + pytest. A PostgreSQL service is provisioned so the Alembic
# migration and the live checkpointing integration test run against a real DB.

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: multi_agent_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d multi_agent_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Matches src/core/config.py defaults and the postgres service above.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/multi_agent_db
      # Keep tracing off in CI (no key) to avoid LangSmith network noise.
      LANGSMITH_TRACING: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Binary build bundles libpq so psycopg can connect on the runner.
          pip install "psycopg[binary]"

      - name: Type check (mypy --strict)
        run: mypy src/ --strict

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v
